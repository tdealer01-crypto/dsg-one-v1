name: Build DSG OpenClaw APK

on:
  push:
    branches:
      - main
      - 'claude/openclaw-integration-SYHpI'
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release?'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10
        working-directory: apps/android

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: apps/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dsg-openclaw-apk
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: DSG OpenClaw ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          files: apps/android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## DSG OpenClaw — Android APK

            AI agent ครบทุกฟังก์ชัน เชื่อมต่อ 20+ channels ผ่าน DSG governance gate

            ### วิธีติดตั้ง
            1. ดาวน์โหลด `app-debug.apk` ด้านล่าง
            2. Android Settings → เปิด "Install unknown apps"
            3. ติดตั้ง APK
            4. ทำตาม Setup Wizard ในแอป

            ### ต้องการ
            - Android 12+ (API 31)
            - [Termux](https://f-droid.org/packages/com.termux/) จาก F-Droid
            - [Termux:Boot](https://f-droid.org/packages/com.termux.boot/)

            ### Channels รองรับ
            WhatsApp · Telegram · Discord · Line · Signal · Matrix · Slack · Teams · IRC · Google Chat · Feishu · Zalo · QQ · iMessage · Mattermost · Nextcloud Talk
