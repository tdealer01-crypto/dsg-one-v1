name: DSG Verify

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: node --version
      - run: npm --version
      - run: npm ci
      - run: npm run dsg:claim-gate
      - run: npm run dsg:runtime-check
      - run: npm run dsg:typecheck
      - run: npm run lint
      - run: npm run dsg:verify
